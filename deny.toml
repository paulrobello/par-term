# cargo-deny configuration for par-term
# https://embarkstudios.github.io/cargo-deny/
#
# Run locally:  cargo deny check
# Install:      cargo install cargo-deny
#
# This file audits:
#   - advisories: known security vulnerabilities (RustSec)
#   - licenses:   OSI-approved / permissive only
#   - bans:       duplicate crate versions and explicit denylists
#   - sources:    only crates.io and known git sources

[graph]
# Treat these targets when checking. Omitting the field checks all targets.
targets = [
    "x86_64-unknown-linux-gnu",
    "x86_64-apple-darwin",
    "aarch64-apple-darwin",
    "x86_64-pc-windows-msvc",
]

# ---------------------------------------------------------------------------
# Advisories (RustSec vulnerability database)
# ---------------------------------------------------------------------------
[advisories]
# Path to a local advisory database clone. Leave unset to use the default
# fetched copy (~/.cargo/advisory-db).
# db-path = "~/.cargo/advisory-db"

# The URL(s) of the advisory databases to use.
db-urls = ["https://github.com/rustsec/advisory-db"]

# Vulnerability and notice advisories are always treated as errors as of the
# v2 config schema (the old `vulnerability`/`notice` lint-level keys were
# removed). Use `ignore` below to suppress specific advisory IDs.

# Scope for unmaintained-crate advisories: "all", "workspace", "transitive",
# or "none". Any crate matched by the chosen scope now always fails the
# check (the old warn-only `unmaintained` lint level no longer exists), so
# "workspace" is used to preserve the previous non-fatal intent — it flags
# our own crates going unmaintained without failing on transitive deps we
# don't control (e.g. font-parsing libs pulled in by rendering deps).
unmaintained = "workspace"

# The lint level for crates that have been yanked from their source registry.
yanked = "warn"

# A list of advisory IDs to ignore. Add entries here only with a comment
# explaining why the advisory does not apply to this project.
ignore = [
    # Example (do not uncomment without justification):
    # "RUSTSEC-2020-0001",  # Reason: only affects the X feature which we don't use

    "RUSTSEC-2026-0195",  # quick-xml <0.41: unbounded namespace alloc DoS — only reachable via wayland-scanner, a Linux-only build-time proc-macro parsing trusted Wayland protocol XML; no compatible patched version (wayland-scanner pins quick-xml 0.39)
    "RUSTSEC-2026-0194",  # quick-xml <0.41: quadratic duplicate-attribute check — same trusted build-time-only exposure as above
]

# ---------------------------------------------------------------------------
# Licenses
# ---------------------------------------------------------------------------
[licenses]
# Confidence threshold for license text detection (0.0–1.0).
confidence-threshold = 0.8

# Allowed licenses (SPDX identifiers).
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Zlib",
    "CC0-1.0",
    "MPL-2.0",
    "OpenSSL",
]

# Crates whose license cannot be detected automatically but are known-good.
# Provide the SPDX expression alongside the crate name.
exceptions = [
    # Example: { allow = ["LicenseRef-ring"], name = "ring", version = "*" }

    # Boost Software License 1.0 (OSI-approved permissive) — clipboard support via arboard.
    { allow = ["BSL-1.0"], crate = "clipboard-win" },
    { allow = ["BSL-1.0"], crate = "error-code" },
    # SIL OFL 1.1 + Ubuntu Font License 1.0 — egui's embedded default UI fonts.
    # Font licenses; permissive for embedding, standard for egui apps.
    { allow = ["OFL-1.1", "Ubuntu-font-1.0"], crate = "epaint_default_fonts" },
    # bzip2 license (BSD-style permissive) — transitive via zip archive support.
    { allow = ["bzip2-1.0.6"], crate = "libbz2-rs-sys" },
    # Community Data License Agreement Permissive 2.0 — Mozilla CA root certs via ureq.
    { allow = ["CDLA-Permissive-2.0"], crate = "webpki-root-certs" },
]

# ---------------------------------------------------------------------------
# Bans
# ---------------------------------------------------------------------------
[bans]
# Lint level for when multiple versions of the same crate are detected.
multiple-versions = "warn"

# Lint level for wildcard dependencies (e.g. dep = "*").
wildcards = "deny"

# The graph highlights used when outputting the bans section.
highlight = "all"

# Crates that are allowed to have multiple versions (commonly unavoidable
# due to transitive dependencies from separate ecosystems).
skip = [
    # Example: { name = "bitflags", version = "1" }
]

# Crates that are completely banned from the dependency tree.
deny = [
    # Avoid the unmaintained `term` crate.
    { name = "term" },
]

# ---------------------------------------------------------------------------
# Sources
# ---------------------------------------------------------------------------
[sources]
# Lint level for crates from unknown registries.
unknown-registry = "deny"

# Lint level for crates from unknown git sources.
unknown-git = "deny"

# List of allowed registries (in addition to crates.io).
allow-registry = ["https://github.com/rust-lang/crates.io-index"]

# List of git hosts/URLs allowed as dependency sources.
allow-git = [
    # Add known git dependencies here if any are used.
    # Example: "https://github.com/paulrobello/some-dep"
]
