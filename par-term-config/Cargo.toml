[package]
name = "par-term-config"
version = "0.7.0"
edition = "2024"
authors = ["Paul Robello <probello@gmail.com>"]
description = "Configuration system for par-term terminal emulator"
license = "MIT"
repository = "https://github.com/paulrobello/par-term"
homepage = "https://github.com/paulrobello/par-term"
keywords = ["terminal", "config", "configuration"]
categories = ["config"]

[dependencies]
# Serialization
serde.workspace = true
serde_json.workspace = true
serde_yaml_ng.workspace = true
toml.workspace = true

# UUID for profile identifiers
uuid.workspace = true

# Error handling
anyhow.workspace = true
thiserror.workspace = true

# Logging
log.workspace = true

# Platform-specific directories
dirs.workspace = true

# Regex for variable substitution
regex.workspace = true

# File watching for config hot reload
notify = { workspace = true, optional = true }

# GPU types (optional, for wgpu conversions)
wgpu = { workspace = true, optional = true }

# Mutex for watcher
parking_lot.workspace = true

# Hostname detection for snippet variables
hostname.workspace = true

# Terminal emulator core (required for UnicodeVersion, AmbiguousWidth, NormalizationForm types)
par-term-emu-core-rust.workspace = true

[features]
default = ["watcher"]
watcher = ["notify"]
wgpu-types = ["wgpu"]

[dev-dependencies]
tempfile.workspace = true
